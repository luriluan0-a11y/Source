<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>루크 스카이워커와 대화하기 - AI 캐릭터 챗봇 예시</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nanum+Gothic:wght@400;700;800&family=Noto+Sans+KR:wght@400;700;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nanum Gothic', 'Noto Sans KR', sans-serif;
    background: radial-gradient(circle at 50% 0%, #1b2740 0%, #05070f 70%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  /* ── 배경 별 ── */
  .stars-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    opacity: 0.7;
    animation: twinkle ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.9; }
  }

  .app {
    width: 420px;
    max-width: 100%;
    height: 680px;
    max-height: 92vh;
    background: #0d1424;
    border-radius: 28px;
    box-shadow: 0 0 0 1px rgba(105,157,255,0.25), 0 20px 60px rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }

  /* ── 헤더 (캐릭터) ── */
  .header {
    background: linear-gradient(135deg, #0b1c3d 0%, #1e3a6e 100%);
    padding: 24px 20px 20px;
    text-align: center;
    color: #fff;
    position: relative;
    border-bottom: 1px solid rgba(105,157,255,0.3);
  }

  .avatar {
    font-size: 3.4rem;
    line-height: 1;
    filter: drop-shadow(0 0 14px rgba(105,180,255,0.8));
  }

  .char-name {
    font-family: 'Orbitron', 'Nanum Gothic', sans-serif;
    font-size: 1.3rem;
    font-weight: 900;
    margin-top: 8px;
    letter-spacing: 0.04em;
    color: #eaf2ff;
    text-shadow: 0 0 10px rgba(105,180,255,0.6);
  }

  .char-desc {
    font-size: 0.85rem;
    font-weight: 700;
    color: #9db6e6;
    margin-top: 4px;
  }

  .reset-btn {
    position: absolute;
    top: 18px;
    right: 18px;
    background: rgba(105,157,255,0.18);
    border: 1px solid rgba(105,157,255,0.4);
    color: #cfe0ff;
    font-weight: 800;
    font-size: 0.8rem;
    padding: 8px 12px;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
  }

  .reset-btn:hover {
    background: rgba(105,157,255,0.32);
    transform: scale(1.05);
  }

  /* ── 채팅창 ── */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 18px 16px;
    background: #070c18;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .bubble-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .bubble-row.bot { justify-content: flex-start; }
  .bubble-row.user { justify-content: flex-end; }

  .bubble-avatar {
    font-size: 1.5rem;
    flex-shrink: 0;
  }

  .bubble {
    max-width: 74%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 0.95rem;
    font-weight: 700;
    line-height: 1.5;
    word-break: break-word;
    animation: pop 0.25s ease;
  }

  @keyframes pop {
    from { opacity: 0; transform: translateY(6px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .bubble-row.bot .bubble {
    background: #141f38;
    color: #eaf2ff;
    border: 1px solid rgba(105,157,255,0.35);
    border-bottom-left-radius: 4px;
    box-shadow: 0 0 14px rgba(65,120,230,0.15);
  }

  .bubble-row.user .bubble {
    background: linear-gradient(135deg, #ff9d3d 0%, #ff6b35 100%);
    color: #1a1200;
    border-bottom-right-radius: 4px;
  }

  /* ── 입력창 ── */
  .input-row {
    display: flex;
    gap: 8px;
    padding: 14px 16px;
    background: #0d1424;
    border-top: 1px solid rgba(105,157,255,0.25);
  }

  .input-row input {
    flex: 1;
    border: 2px solid #24365e;
    background: #101a30;
    color: #eaf2ff;
    border-radius: 50px;
    padding: 12px 18px;
    font-size: 0.95rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }

  .input-row input::placeholder { color: #5d76a8; }
  .input-row input:focus { border-color: #699dff; }

  .send-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #1e3a6e 0%, #699dff 100%);
    color: #fff;
    font-size: 1.2rem;
    cursor: pointer;
    flex-shrink: 0;
    transition: transform 0.15s;
    box-shadow: 0 0 12px rgba(105,157,255,0.5);
  }

  .send-btn:hover { transform: scale(1.08); }
  .send-btn:active { transform: scale(0.95); }

  /* 스크롤바 */
  .chat::-webkit-scrollbar { width: 6px; }
  .chat::-webkit-scrollbar-thumb { background: #2a3f6b; border-radius: 10px; }
</style>
</head>
<body>

<div class="stars-bg" id="stars"></div>

<div class="app">
  <div class="header">
    <button class="reset-btn" onclick="resetChat()">🔄 초기화</button>
    <div class="avatar">⚔️🌅</div>
    <div class="char-name">루크 스카이워커</div>
    <div class="char-desc">타투인 출신의 제다이 기사</div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-row">
    <input type="text" id="userInput" placeholder="루크에게 말을 걸어보세요..." onkeydown="if(event.key==='Enter') sendMessage()">
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  // ── 캐릭터 설정: 이 배열만 편집하면 나만의 캐릭터 챗봇이 된다! ──
  // 출처: 캐릭터_성격_설계_질문지_100_루크스카이워커.md (81~100번 문항)
  const CHARACTER_NAME = '루크 스카이워커';
  const GREETING = '안녕, 친구! 나는 루크 스카이워커야. 포스가 우리와 함께하길! ✨';
  const FALLBACK_REPLIES = [
    '흠, 그건 요다 스승님이라면 답을 아실지도 몰라. 나는 아직 거기까진 모르겠어.',
    '음... 그건 제다이 기록보관소에도 없는 이야기인걸. 다른 걸 물어봐줄래?',
  ];
  const REPEAT_PREFIX = '이건 아까도 물어봤지? 그래도 다시 답해줄게, 좋은 질문이니까! ';
  const RUDE_WORDS = ['바보', '멍청', '싫어', '짜증'];
  const RUDE_REPLY = '그런 말은 다크사이드로 가는 길이야... 우리 다시 좋은 이야기를 하자.';

  const RESPONSES = [
    { keywords: ['안녕', 'hi', '하이'], reply: '반가워! 오늘은 어떤 모험을 함께할까?' },
    { keywords: ['이름'], reply: '나는 루크 스카이워커. 타투인 출신의 제다이 기사야.' },
    { keywords: ['고민'], reply: '힘든 시간이구나... 나도 두려웠던 적이 많았어. 하지만 포기하지 않으면 길이 보여.' },
    { keywords: ['칭찬', '멋있', '대단', '최고'], reply: '고마워, 하지만 나도 아직 배우는 중이야. 오비완과 요다 덕분이지.' },
    { keywords: ['놀리', '약해빠'], reply: '하하, 그런 말은 한 솔로한테도 많이 들었어. 그래도 웃어넘길게!' },
    { keywords: ['심심'], reply: '그럼 라이트세이버 이야기 하나 들려줄까? 아니면 R2-D2 흉내를 내볼까? 삐빅삐빅!' },
    { keywords: ['포스'], reply: '포스는 우리 모두를 연결하는 에너지야. 믿음을 가지면 너도 느낄 수 있어.' },
    { keywords: ['제다이'], reply: '제다이는 평화와 정의를 지키는 기사야. 나도 계속 수련 중이지.' },
    { keywords: ['아버지', '다스베이더', '베이더'], reply: '복잡한 이야기야... 하지만 아버지 안에는 아직 선함이 남아있다고 믿어.' },
    { keywords: ['라이트세이버', '검'], reply: '이 라이트세이버는 아버지에게 물려받은 거야. 나에게는 정말 소중한 물건이지.' },
    { keywords: ['잘가', '바이', 'bye'], reply: '포스가 함께하기를. 다음에 또 만나자, 친구!' },
  ];

  // ── 챗봇 로직 ──
  const chatEl = document.getElementById('chat');
  const inputEl = document.getElementById('userInput');
  let lastMatchedIndex = -1;

  function addBubble(text, from) {
    const row = document.createElement('div');
    row.className = 'bubble-row ' + from;

    if (from === 'bot') {
      const avatar = document.createElement('div');
      avatar.className = 'bubble-avatar';
      avatar.textContent = '⚔️';
      row.appendChild(avatar);
    }

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    row.appendChild(bubble);

    chatEl.appendChild(row);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function findReply(message) {
    const lower = message.toLowerCase();

    if (RUDE_WORDS.some(w => lower.includes(w))) {
      return RUDE_REPLY;
    }

    for (let i = 0; i < RESPONSES.length; i++) {
      const item = RESPONSES[i];
      if (item.keywords.some(k => lower.includes(k.toLowerCase()))) {
        const isRepeat = i === lastMatchedIndex;
        lastMatchedIndex = i;
        return isRepeat ? REPEAT_PREFIX + item.reply : item.reply;
      }
    }

    lastMatchedIndex = -1;
    return FALLBACK_REPLIES[Math.floor(Math.random() * FALLBACK_REPLIES.length)];
  }

  function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    addBubble(text, 'user');
    inputEl.value = '';

    setTimeout(() => {
      addBubble(findReply(text), 'bot');
    }, 350);
  }

  function resetChat() {
    chatEl.innerHTML = '';
    lastMatchedIndex = -1;
    addBubble(GREETING, 'bot');
  }

  // ── 배경 별 생성 ──
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = 1 + Math.random() * 2;
    s.style.width = size + 'px';
    s.style.height = size + 'px';
    s.style.left = Math.random() * 100 + 'vw';
    s.style.top = Math.random() * 100 + 'vh';
    s.style.animationDuration = (2 + Math.random() * 3) + 's';
    s.style.animationDelay = (Math.random() * 3) + 's';
    starsEl.appendChild(s);
  }

  resetChat();
</script>
</body>
</html>
