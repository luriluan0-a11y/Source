<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#4f8ef7" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#4f8ef7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f8ef7"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="bugGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7a14f"/>
      <stop offset="100%" stop-color="#f76fd0"/>
    </linearGradient>
  </defs>

  <!-- ambient glow -->
  <circle cx="100" cy="100" r="95" fill="url(#glow)"/>

  <!-- dashed orbit ring -->
  <circle cx="100" cy="100" r="74" fill="none" stroke="url(#ring)" stroke-width="3" stroke-dasharray="6 9" opacity="0.55"/>

  <!-- bug (defect) -->
  <g transform="translate(78,68)">
    <line x1="14" y1="6" x2="7" y2="-7" stroke="#f7a14f" stroke-width="2.6" stroke-linecap="round"/>
    <line x1="26" y1="6" x2="33" y2="-7" stroke="#f7a14f" stroke-width="2.6" stroke-linecap="round"/>
    <circle cx="20" cy="13" r="10" fill="url(#bugGrad)"/>
    <ellipse cx="20" cy="35" rx="17" ry="23" fill="url(#bugGrad)"/>
    <line x1="16" y1="35" x2="24" y2="35" stroke="#1e2540" stroke-width="2" opacity="0.4"/>
    <g stroke="#f7a14f" stroke-width="3" stroke-linecap="round">
      <line x1="4" y1="22" x2="-9" y2="14"/>
      <line x1="3" y1="34" x2="-11" y2="34"/>
      <line x1="4" y1="46" x2="-9" y2="54"/>
      <line x1="36" y1="22" x2="49" y2="14"/>
      <line x1="37" y1="34" x2="51" y2="34"/>
      <line x1="36" y1="46" x2="49" y2="54"/>
    </g>
  </g>

  <!-- magnifying glass inspecting the bug, checkmark = verified defect -->
  <g transform="translate(98,88)">
    <circle cx="0" cy="0" r="32" fill="rgba(20,24,40,0.55)" stroke="#4fffa0" stroke-width="5"/>
    <line x1="23" y1="23" x2="46" y2="46" stroke="#4fffa0" stroke-width="7" stroke-linecap="round"/>
    <path d="M -12 1 L -3 10 L 14 -12" fill="none" stroke="#4fffa0" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
