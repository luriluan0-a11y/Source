<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 퀴즈왕</title>
<style>
  :root{
    --stage-1:#1a1440;
    --stage-2:#2d1b69;
    --stage-3:#3d2381;
    --gold:#ffc93c;
    --gold-deep:#e6a800;
    --coral:#ff6b9d;
    --teal:#4ecdc4;
    --silver:#cfd8e3;
    --bronze:#d98a4f;
    --ink:#f5f3ff;
    --ink-dim:#c9c2ea;
    --wrong:#ff4d6d;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Noto Sans KR', sans-serif;
    color:var(--ink);
    background:
      radial-gradient(ellipse 60% 45% at 50% 0%, rgba(255,201,60,0.18), transparent 60%),
      radial-gradient(ellipse 80% 60% at 20% 100%, rgba(255,107,157,0.12), transparent 60%),
      linear-gradient(180deg, var(--stage-1) 0%, var(--stage-2) 55%, var(--stage-3) 100%);
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }
  /* spotlight beams */
  .beams{
    position:fixed; inset:0; pointer-events:none; z-index:0; opacity:0.35;
  }
  .beam{
    position:absolute; top:-10%; width:140px; height:120%;
    background:linear-gradient(180deg, rgba(255,201,60,0.35), transparent 70%);
    filter:blur(6px);
    transform-origin:top center;
  }
  .beam:nth-child(1){ left:8%; transform:rotate(-14deg); animation:sway 7s ease-in-out infinite; }
  .beam:nth-child(2){ left:38%; transform:rotate(6deg); animation:sway 9s ease-in-out infinite reverse; }
  .beam:nth-child(3){ left:68%; transform:rotate(-4deg); animation:sway 8s ease-in-out infinite; }
  .beam:nth-child(4){ left:88%; transform:rotate(12deg); animation:sway 6.5s ease-in-out infinite reverse; }
  @keyframes sway{ 0%,100%{ transform:rotate(var(--r,0deg)); } 50%{ transform:rotate(calc(var(--r,0deg) + 5deg)); } }

  .app{
    position:relative; z-index:1;
    max-width:720px; margin:0 auto;
    min-height:100vh;
    display:flex; flex-direction:column;
    padding:32px 20px 48px;
  }
  .screen{ display:none; flex:1; flex-direction:column; }
  .screen.active{ display:flex; }

  /* ---------- Title screen ---------- */
  .eyebrow{
    text-align:center; letter-spacing:0.3em; font-size:12px; color:var(--gold);
    font-weight:700; margin-bottom:10px;
  }
  .title-main{
    font-family:'Black Han Sans', sans-serif;
    font-size:clamp(40px, 10vw, 64px);
    text-align:center;
    line-height:1.1;
    background:linear-gradient(180deg, #fff 10%, var(--gold) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow:0 0 40px rgba(255,201,60,0.35);
    margin-bottom:6px;
  }
  .title-sub{
    text-align:center; color:var(--ink-dim); font-size:14px; margin-bottom:36px;
  }
  .trophy{
    width:88px; height:88px; margin:0 auto 18px;
    display:flex; align-items:center; justify-content:center;
    font-size:44px;
    background:radial-gradient(circle at 35% 30%, #fff6d8, var(--gold) 55%, var(--gold-deep) 100%);
    border-radius:50%;
    box-shadow:0 0 0 6px rgba(255,201,60,0.12), 0 12px 30px rgba(255,201,60,0.35);
    animation:bob 3.2s ease-in-out infinite;
  }
  @keyframes bob{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-8px);} }

  .topic-label{
    text-align:center; color:var(--ink-dim); font-size:13px; margin-bottom:16px;
  }
  .topics{
    display:grid; gap:14px; grid-template-columns:1fr;
  }
  .topic-card{
    display:flex; align-items:center; gap:16px;
    padding:18px 20px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.08);
    background:rgba(255,255,255,0.04);
    cursor:pointer;
    text-align:left;
    color:var(--ink);
    font-family:'Noto Sans KR', sans-serif;
    transition:transform .18s ease, background .18s ease, border-color .18s ease;
    position:relative;
    overflow:hidden;
  }
  .topic-card::before{
    content:""; position:absolute; inset:0; opacity:0; transition:opacity .18s ease;
    background:var(--accent);
  }
  .topic-card:hover{ transform:translateY(-3px); border-color:rgba(255,255,255,0.2); }
  .topic-card:hover::before{ opacity:0.10; }
  .topic-card:active{ transform:translateY(0); }
  .topic-icon{
    width:52px; height:52px; border-radius:14px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:26px;
    background:var(--accent);
    box-shadow:0 6px 16px rgba(0,0,0,0.25);
  }
  .topic-text strong{ display:block; font-size:18px; font-weight:700; }
  .topic-text span{ display:block; font-size:12.5px; color:var(--ink-dim); margin-top:2px; }
  .topic-arrow{ margin-left:auto; font-size:20px; color:var(--ink-dim); }

  .stage-caption{
    margin-top:auto; padding-top:28px; text-align:center; font-size:11px; color:rgba(245,243,255,0.35);
  }

  /* ---------- Quiz screen ---------- */
  .quiz-header{
    display:flex; align-items:center; justify-content:space-between; margin-bottom:22px;
  }
  .quiz-cat{
    font-family:'Black Han Sans', sans-serif; font-size:20px; color:var(--gold);
  }
  .progress-track{
    flex:1; height:8px; margin:0 14px; border-radius:99px; background:rgba(255,255,255,0.1); overflow:hidden;
  }
  .progress-fill{
    height:100%; border-radius:99px;
    background:linear-gradient(90deg, var(--coral), var(--gold));
    transition:width .35s ease;
  }
  .score-badge{
    font-weight:700; font-size:14px; color:var(--ink);
    background:rgba(255,255,255,0.08); padding:6px 12px; border-radius:99px;
    white-space:nowrap;
  }
  .score-badge b{ color:var(--gold); }

  .question-card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:22px;
    padding:28px 24px;
    margin-bottom:22px;
    min-height:120px;
    display:flex; align-items:center;
  }
  .question-text{
    font-size:19px; font-weight:700; line-height:1.5;
  }
  .question-num{
    display:inline-block; font-size:12px; color:var(--gold); font-weight:700;
    margin-bottom:10px; letter-spacing:0.05em;
  }

  .options{
    display:grid; gap:12px;
  }
  .option-btn{
    display:flex; align-items:center; gap:12px;
    padding:16px 18px;
    border-radius:16px;
    border:1.5px solid rgba(255,255,255,0.12);
    background:rgba(255,255,255,0.03);
    color:var(--ink);
    font-family:'Noto Sans KR', sans-serif;
    font-size:15.5px; font-weight:500;
    text-align:left;
    cursor:pointer;
    transition:transform .12s ease, border-color .12s ease, background .12s ease;
  }
  .option-btn .opt-mark{
    width:28px; height:28px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:700;
    background:rgba(255,255,255,0.08);
  }
  .option-btn:hover:not(:disabled){ border-color:var(--gold); transform:translateY(-2px); }
  .option-btn:disabled{ cursor:default; }
  .option-btn.correct{
    border-color:var(--teal); background:rgba(78,205,196,0.16);
  }
  .option-btn.correct .opt-mark{ background:var(--teal); color:#0b2b28; }
  .option-btn.wrong{
    border-color:var(--wrong); background:rgba(255,77,109,0.14);
    animation:shake .35s ease;
  }
  .option-btn.wrong .opt-mark{ background:var(--wrong); color:#fff; }
  @keyframes shake{
    0%,100%{ transform:translateX(0); } 25%{ transform:translateX(-6px); } 75%{ transform:translateX(6px); }
  }

  .feedback{
    margin-top:16px; min-height:26px; text-align:center;
    font-size:14px; font-weight:700;
  }
  .feedback.retry{ color:var(--gold); }
  .feedback.reveal{ color:var(--ink-dim); }

  /* ---------- Result screen ---------- */
  .result-wrap{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
  .medal{
    width:150px; height:150px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:70px; margin-bottom:22px;
    position:relative;
    animation:medalIn .55s cubic-bezier(.2,1.4,.4,1);
  }
  @keyframes medalIn{ 0%{ transform:scale(0) rotate(-30deg); opacity:0;} 100%{ transform:scale(1) rotate(0); opacity:1;} }
  .medal.gold{ background:radial-gradient(circle at 35% 30%, #fff6d8, var(--gold) 55%, var(--gold-deep) 100%); box-shadow:0 0 0 8px rgba(255,201,60,0.15), 0 16px 40px rgba(255,201,60,0.45);}
  .medal.silver{ background:radial-gradient(circle at 35% 30%, #ffffff, var(--silver) 55%, #9fb0c4 100%); box-shadow:0 0 0 8px rgba(207,216,227,0.15), 0 16px 40px rgba(207,216,227,0.35);}
  .medal.bronze{ background:radial-gradient(circle at 35% 30%, #f3c396, var(--bronze) 55%, #a5622d 100%); box-shadow:0 0 0 8px rgba(217,138,79,0.15), 0 16px 40px rgba(217,138,79,0.35);}
  .medal.none{ background:rgba(255,255,255,0.08); box-shadow:none; font-size:52px; }

  .result-title{ font-family:'Black Han Sans', sans-serif; font-size:30px; margin-bottom:8px; }
  .result-sub{ color:var(--ink-dim); font-size:14px; margin-bottom:6px; }
  .result-score{ font-size:15px; color:var(--gold); font-weight:700; margin-bottom:30px; }

  .result-actions{ display:flex; gap:12px; width:100%; max-width:340px; }
  .btn{
    flex:1; padding:15px 16px; border-radius:14px; border:none; cursor:pointer;
    font-family:'Noto Sans KR', sans-serif; font-weight:700; font-size:14.5px;
    transition:transform .12s ease, filter .12s ease;
  }
  .btn:hover{ filter:brightness(1.08); transform:translateY(-2px); }
  .btn:active{ transform:translateY(0); }
  .btn-primary{ background:linear-gradient(135deg, var(--coral), var(--gold)); color:#241435; }
  .btn-secondary{ background:rgba(255,255,255,0.08); color:var(--ink); border:1px solid rgba(255,255,255,0.15); }

  .back-link{
    background:none; border:none; color:var(--ink-dim); font-size:13px; cursor:pointer;
    display:flex; align-items:center; gap:4px; margin-bottom:18px; align-self:flex-start;
    font-family:'Noto Sans KR', sans-serif;
  }
  .back-link:hover{ color:var(--ink); }

  @media (max-width:420px){
    .app{ padding:24px 16px 36px; }
    .question-card{ padding:22px 18px; }
  }
</style>
</head>
<body>

<div class="beams" aria-hidden="true">
  <div class="beam"></div><div class="beam"></div><div class="beam"></div><div class="beam"></div>
</div>

<div class="app">

  <!-- ================= 타이틀 화면 ================= -->
  <section class="screen active" id="screen-title">
    <div class="trophy">🏆</div>
    <div class="eyebrow">SERIOUS GAME · QUIZ SHOW</div>
    <h1 class="title-main">오늘의 퀴즈왕</h1>
    <p class="title-sub">분야를 골라 10문제에 도전해 보세요</p>

    <p class="topic-label">주제 선택</p>
    <div class="topics">
      <button class="topic-card" style="--accent:#4ecdc4" data-topic="animal">
        <div class="topic-icon">🐾</div>
        <div class="topic-text">
          <strong>동물</strong>
          <span>다양한 동물에 대한 퀴즈 문제</span>
        </div>
        <div class="topic-arrow">›</div>
      </button>
      <button class="topic-card" style="--accent:#ff6b9d" data-topic="society">
        <div class="topic-icon">🏛️</div>
        <div class="topic-text">
          <strong>사회</strong>
          <span>다양한 사회에 대한 퀴즈 문제</span>
        </div>
        <div class="topic-arrow">›</div>
      </button>
      <button class="topic-card" style="--accent:#ffc93c" data-topic="culture">
        <div class="topic-icon">🎭</div>
        <div class="topic-text">
          <strong>문화</strong>
          <span>다양한 문화에 대한 퀴즈 문제</span>
        </div>
        <div class="topic-arrow">›</div>
      </button>
    </div>

    <p class="stage-caption">경기공유학교 2026 · 가족과 함께하는 AI 바이브코딩(유한대학교)</p>
  </section>

  <!-- ================= 퀴즈 화면 ================= -->
  <section class="screen" id="screen-quiz">
    <button class="back-link" id="quiz-exit">← 돌아가기</button>
    <div class="quiz-header">
      <span class="quiz-cat" id="quiz-cat-label">동물 퀴즈</span>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <span class="score-badge">점수 <b id="score-label">0</b>/10</span>
    </div>

    <div class="question-card">
      <div>
        <span class="question-num" id="question-num">문제 1 / 10</span>
        <p class="question-text" id="question-text">문제를 불러오는 중...</p>
      </div>
    </div>

    <div class="options" id="options-wrap"></div>
    <p class="feedback" id="feedback"></p>
  </section>

  <!-- ================= 결과 화면 ================= -->
  <section class="screen" id="screen-result">
    <div class="result-wrap">
      <div class="medal" id="medal-icon">🥇</div>
      <h2 class="result-title" id="result-title">금메달!</h2>
      <p class="result-sub" id="result-sub">완벽한 퀴즈왕이에요</p>
      <p class="result-score" id="result-score">10문제 중 10점 획득</p>
      <div class="result-actions">
        <button class="btn btn-secondary" id="btn-back">돌아가기</button>
        <button class="btn btn-primary" id="btn-retry">다시 풀기</button>
      </div>
    </div>
  </section>

</div>

<script>
/* ==================== 퀴즈 데이터 ==================== */
const quizData = {
  animal: {
    label: "동물 퀴즈",
    questions: [
      { q: "지구상에서 가장 큰 동물은 무엇인가?", options: ["아프리카코끼리", "흰수염고래", "기린", "대왕오징어"], correct: 1 },
      { q: "캥거루가 서식하는 대표적인 대륙은?", options: ["아프리카", "남아메리카", "오세아니아(호주)", "유럽"], correct: 2 },
      { q: "다음 중 알을 낳는 포유류는?", options: ["박쥐", "오리너구리", "고래", "돌고래"], correct: 1 },
      { q: "다음 중 밤에 주로 활동하는 야행성 동물은?", options: ["참새", "부엉이", "닭", "비둘기"], correct: 1 },
      { q: "사자 무리를 부르는 명칭은?", options: ["팩(pack)", "플락(flock)", "프라이드(pride)", "허드(herd)"], correct: 2 },
      { q: "다음 중 곤충이 아닌 동물은?", options: ["개미", "거미", "나비", "꿀벌"], correct: 1 },
      { q: "카멜레온이 몸 색깔을 바꾸는 주된 이유가 아닌 것은?", options: ["체온 조절", "의사소통", "위장(은신)", "영양분 섭취"], correct: 3 },
      { q: "다음 중 온몸이 비늘로 덮인 파충류는?", options: ["개구리", "도마뱀", "고양이", "펭귄"], correct: 1 },
      { q: "판다가 주로 먹는 먹이는?", options: ["대나무", "과일", "물고기", "곤충"], correct: 0 },
      { q: "다음 중 국내에서 멸종위기종으로 지정되지 않은 동물은?", options: ["반달가슴곰", "황새", "집비둘기", "수달"], correct: 2 }
    ]
  },
  society: {
    label: "사회 퀴즈",
    questions: [
      { q: "대한민국 헌법상 국가의 주권은 누구에게 있는가?", options: ["대통령", "국회", "국민", "헌법재판소"], correct: 2 },
      { q: "한 나라의 물가가 지속적으로 상승하는 현상을 무엇이라고 하는가?", options: ["디플레이션", "인플레이션", "스태그플레이션", "디폴트"], correct: 1 },
      { q: "국제연합(UN)의 주요 기관 중 국제 평화와 안전 유지에 책임을 지는 기관은?", options: ["총회", "안전보장이사회", "경제사회이사회", "국제사법재판소"], correct: 1 },
      { q: "한 사회의 구성원들이 공유하는 생활 양식의 총체를 의미하는 용어는?", options: ["이데올로기", "문화", "아노미", "사회화"], correct: 1 },
      { q: "법률이 헌법에 위반되는지를 심판하는 대한민국의 기관은?", options: ["대법원", "국회", "헌법재판소", "감사원"], correct: 2 },
      { q: "수요와 공급이 일치해 가격과 거래량이 결정되는 지점을 무엇이라 하는가?", options: ["균형가격", "최저가격", "독점가격", "한계가격"], correct: 0 },
      { q: "지구 온난화의 주된 원인으로 지목되는 대표적인 온실가스는?", options: ["산소", "질소", "이산화탄소", "아르곤"], correct: 2 },
      { q: "근대 시민혁명을 통해 확립된, 국가 권력으로부터 개인의 자유를 보장받을 권리는?", options: ["사회권", "자유권", "참정권", "청구권"], correct: 1 },
      { q: "저소득층에게 최저 생활을 보장하기 위한 대한민국의 대표적 공공부조 제도는?", options: ["국민연금", "국민기초생활보장제도", "고용보험", "산업재해보상보험"], correct: 1 },
      { q: "저출산·고령화로 생산가능인구 비율이 줄고 부양 인구가 늘어나는 현상은?", options: ["인구 절벽", "인구 보너스", "베이비붐", "인구 증가"], correct: 0 }
    ]
  },
  culture: {
    label: "문화 퀴즈",
    questions: [
      { q: "유네스코 세계유산으로 등재된 대한민국의 궁궐은?", options: ["경복궁", "롯데월드", "63빌딩", "남산타워"], correct: 0 },
      { q: "한글을 창제한 조선의 왕은?", options: ["태조", "세종대왕", "정조", "영조"], correct: 1 },
      { q: "추석에 먹는 대표적인 한국 전통 음식은?", options: ["떡국", "송편", "삼계탕", "팥죽"], correct: 1 },
      { q: "일본의 전통 의상은?", options: ["기모노", "한복", "치파오", "아오자이"], correct: 0 },
      { q: "세계 3대 영화제에 속하지 않는 것은?", options: ["칸 영화제", "베니스 영화제", "베를린 영화제", "오스카 시상식"], correct: 3 },
      { q: "유네스코 인류무형문화유산으로 등재된 한국의 전통 공연은?", options: ["판소리", "오페라", "발레", "뮤지컬"], correct: 0 },
      { q: "이탈리아를 대표하는 전통 음식은?", options: ["스시", "파스타", "타코", "케밥"], correct: 1 },
      { q: "인도에서 대다수 인구가 믿는 종교는?", options: ["불교", "힌두교", "이슬람교", "기독교"], correct: 1 },
      { q: "중국의 '춘절'과 같은 의미를 가지는 한국의 명절은?", options: ["설날", "추석", "단오", "동지"], correct: 0 },
      { q: "세계 최초의 금속활자본으로 알려진 고려의 인쇄물은?", options: ["팔만대장경", "직지심체요절", "훈민정음", "동의보감"], correct: 1 }
    ]
  }
};

/* ==================== 상태 ==================== */
let state = {
  topic: null,
  idx: 0,
  score: 0,
  wrongAttempts: 0
};

const screens = {
  title: document.getElementById('screen-title'),
  quiz: document.getElementById('screen-quiz'),
  result: document.getElementById('screen-result')
};

function showScreen(name){
  Object.values(screens).forEach(s => s.classList.remove('active'));
  screens[name].classList.add('active');
}

/* ==================== 타이틀 화면 ==================== */
document.querySelectorAll('.topic-card').forEach(card => {
  card.addEventListener('click', () => startQuiz(card.dataset.topic));
});

function startQuiz(topic){
  state.topic = topic;
  state.idx = 0;
  state.score = 0;
  state.wrongAttempts = 0;
  document.getElementById('quiz-cat-label').textContent = quizData[topic].label;
  showScreen('quiz');
  renderQuestion();
}

document.getElementById('quiz-exit').addEventListener('click', () => showScreen('title'));

/* ==================== 퀴즈 화면 ==================== */
const optionsWrap = document.getElementById('options-wrap');
const feedbackEl = document.getElementById('feedback');
const marks = ['A', 'B', 'C', 'D'];

function renderQuestion(){
  feedbackEl.textContent = '';
  feedbackEl.className = 'feedback';
  state.wrongAttempts = 0;

  const set = quizData[state.topic].questions;
  const q = set[state.idx];

  document.getElementById('question-num').textContent = `문제 ${state.idx + 1} / ${set.length}`;
  document.getElementById('question-text').textContent = q.q;
  document.getElementById('score-label').textContent = state.score;
  document.getElementById('progress-fill').style.width = `${(state.idx / set.length) * 100}%`;

  optionsWrap.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-mark">${marks[i]}</span><span>${opt}</span>`;
    btn.addEventListener('click', () => handleAnswer(i, btn));
    optionsWrap.appendChild(btn);
  });
}

function handleAnswer(selectedIdx, btnEl){
  const set = quizData[state.topic].questions;
  const q = set[state.idx];
  const allBtns = optionsWrap.querySelectorAll('.option-btn');

  if (selectedIdx === q.correct){
    allBtns.forEach(b => b.disabled = true);
    btnEl.classList.add('correct');
    state.score += 1;
    document.getElementById('score-label').textContent = state.score;
    feedbackEl.textContent = '정답이에요! 잘했어요 🎉';
    feedbackEl.className = 'feedback reveal';
    setTimeout(nextQuestion, 900);
    return;
  }

  // 오답 처리
  btnEl.classList.add('wrong');
  state.wrongAttempts += 1;

  if (state.wrongAttempts >= 2){
    allBtns.forEach((b, i) => {
      b.disabled = true;
      if (i === q.correct) b.classList.add('correct');
    });
    feedbackEl.textContent = `정답은 ${marks[q.correct]}. ${q.options[q.correct]} 이에요.`;
    feedbackEl.className = 'feedback reveal';
    setTimeout(nextQuestion, 1400);
  } else {
    btnEl.disabled = true;
    feedbackEl.textContent = '다시 풀어봐~ 한 번 더 골라보세요!';
    feedbackEl.className = 'feedback retry';
  }
}

function nextQuestion(){
  const set = quizData[state.topic].questions;
  state.idx += 1;
  if (state.idx >= set.length){
    document.getElementById('progress-fill').style.width = '100%';
    showResult();
  } else {
    renderQuestion();
  }
}

/* ==================== 결과 화면 ==================== */
function showResult(){
  const score = state.score;
  const medalIcon = document.getElementById('medal-icon');
  const resultTitle = document.getElementById('result-title');
  const resultSub = document.getElementById('result-sub');

  medalIcon.className = 'medal';
  if (score === 10){
    medalIcon.classList.add('gold');
    medalIcon.textContent = '🥇';
    resultTitle.textContent = '금메달!';
    resultSub.textContent = '완벽한 퀴즈왕이에요';
  } else if (score >= 7){
    medalIcon.classList.add('silver');
    medalIcon.textContent = '🥈';
    resultTitle.textContent = '은메달!';
    resultSub.textContent = '아주 훌륭해요';
  } else if (score >= 4){
    medalIcon.classList.add('bronze');
    medalIcon.textContent = '🥉';
    resultTitle.textContent = '동메달!';
    resultSub.textContent = '조금만 더 힘내봐요';
  } else {
    medalIcon.classList.add('none');
    medalIcon.textContent = '📚';
    resultTitle.textContent = '다음 기회에!';
    resultSub.textContent = '한 번 더 도전해 볼까요?';
  }

  document.getElementById('result-score').textContent = `10문제 중 ${score}점 획득`;
  showScreen('result');
}

document.getElementById('btn-retry').addEventListener('click', () => startQuiz(state.topic));
document.getElementById('btn-back').addEventListener('click', () => showScreen('title'));
</script>
